{% extends "base.html" %}

{% block title %}Iniciar Sesion - Monitor Regulatorio{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh]">
    <div class="w-full max-w-sm">
        <div class="bg-white rounded-xl shadow-lg p-8">
            <div class="text-center mb-6">
                <i class="bi bi-shield-check text-blue-600 text-5xl"></i>
                <h2 class="mt-3 text-xl font-semibold text-gray-900">Monitor Regulatorio</h2>
                <p class="text-gray-500 text-sm mt-1">Inicie sesion para continuar</p>
            </div>

            <form method="post" class="space-y-4">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" id="email" name="email"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                           placeholder="usuario@ejemplo.com" required autofocus>
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Contrasena</label>
                    <input type="password" id="password" name="password"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                           required>
                </div>
                <button type="submit"
                        class="w-full bg-blue-600 text-white py-2.5 px-4 rounded-lg font-medium hover:bg-blue-700 transition">
                    <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesion
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
