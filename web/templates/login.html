{% extends "base.html" %}

{% block title %}Iniciar Sesion - Monitor Regulatorio{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <div class="card border-0 shadow">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-shield-check fs-1 text-primary"></i>
                    <h4 class="mt-2">Monitor Regulatorio</h4>
                    <p class="text-muted small">Inicie sesion para continuar</p>
                </div>

                <form method="post">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email"
                               placeholder="usuario@ejemplo.com" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Contrasena</label>
                        <input type="password" class="form-control" id="password" name="password"
                               required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesion
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
